spring.application.name=horeca

spring.datasource.url=jdbc:mysql://localhost:3306/horeca_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=LOCAL
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

server.port=8080

ai.service.retrain-token=${RETRAIN_TOKEN}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

spring.main.banner-mode=off
spring.output.ansi.enabled=never

logging.pattern.console=%d{HH:mm:ss} %-5level %logger{32} - %msg%n

logging.level.root=INFO
logging.level.com.licenta.horeca=INFO

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.connections.pooling=ERROR

logging.level.org.springframework.orm.jpa=ERROR
logging.level.org.springframework.security=ERROR
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.boot.devtools=WARN

logging.level.com.zaxxer.hikari=ERROR

# Limita pentru o tura creata automat atunci cand angajatul
# nu are un program planificat.
app.shifts.unscheduled-max-hours=16

# Durata maxima acceptata pentru o tura planificata.
app.shifts.maximum-duration-hours=16

# Angajatul poate porni tura prin login cu cel mult 60 de minute mai devreme.
app.shifts.early-login-minutes=60

# Verificarea automata a turelor la fiecare 5 minute.
app.shifts.cleanup-delay-ms=300000

# Prima verificare se executa la un minut dupa pornirea backend-ului.
app.shifts.cleanup-initial-delay-ms=60000