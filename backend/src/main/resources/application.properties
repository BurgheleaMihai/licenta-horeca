spring.application.name=horeca

spring.datasource.url=jdbc:mysql://localhost:3306/horeca_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=LOCAL
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
ai.service.retrain-token=${RETRAIN_TOKEN}